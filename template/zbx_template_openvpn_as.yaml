zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 5aef8f8d8ca24b88ad519d7145d1f25c
      name: Templates/VPN
  templates:
    - uuid: ee4fb1083594481b8680f4ab3276619f
      template: 'OpenVPN Access Server by External Check'
      name: 'OpenVPN Access Server by External Check'
      vendor:
        name: 'itforprof.com'
        version: '1.0'
      description: |
        Monitors OpenVPN Access Server via web portal checks.
        Uses a Zabbix web scenario to test LDAP authentication end-to-end.
        Collects web portal availability, response time, and LDAP login status.

        Author: Konstantin Tyutyunnik
        Site:   https://itforprof.com
      groups:
        - name: Templates/VPN
      macros:
        - macro: '{$OVPN_HOST}'
          value: 'localhost'
          description: 'OpenVPN AS hostname or IP address.'
        - macro: '{$OVPN_PORT}'
          value: '943'
          description: 'XMLRPC and web portal port.'
        - macro: '{$OVPN_USER}'
          value: 'openvpn'
          description: 'API username for XMLRPC authentication.'
        - macro: '{$OVPN_PASSWORD}'
          value: ''
          description: 'API password. Set on host after import.'
          type: SECRET_TEXT
        - macro: '{$OVPN_VERIFY_SSL}'
          value: '0'
          description: 'SSL certificate verification (1=verify, 0=skip).'
        - macro: '{$OVPN_TIMEOUT}'
          value: '10'
          description: 'Script timeout in seconds for network operations.'
        - macro: '{$OVPN_AUTH_TEST_USER}'
          value: ''
          description: 'Username for LDAP authentication test. Leave empty to skip.'
        - macro: '{$OVPN_AUTH_TEST_PASSWORD}'
          value: ''
          description: 'Password for LDAP auth test user. Set on host after import.'
          type: SECRET_TEXT
        - macro: '{$OVPN_SESSION_WARN}'
          value: '100'
          description: 'VPN session count warning threshold.'
        - macro: '{$OVPN_SESSION_HIGH}'
          value: '200'
          description: 'VPN session count high/critical threshold.'
        - macro: '{$OVPN_WEB_PORT}'
          value: '443'
          description: 'Web portal port for client-facing connections (VPN client downloads, user web portal).'
        - macro: '{$OVPN_WEB_RESPONSE_WARN}'
          value: '2000'
          description: 'Web portal response time warning threshold (ms).'
      items:
        - uuid: 865d32105c414d53aed7343cec760731
          name: 'OpenVPN AS: Collect all metrics'
          type: EXTERNAL
          key: 'openvpn_as_check.py["{$OVPN_HOST}","{$OVPN_PORT}","{$OVPN_USER}","{$OVPN_PASSWORD}","{$OVPN_AUTH_TEST_USER}","{$OVPN_AUTH_TEST_PASSWORD}","{$OVPN_VERIFY_SSL}","{$OVPN_WEB_PORT}"]'
          delay: 1m
          history: 1h
          trends: '0'
          status: DISABLED
          value_type: TEXT
          description: 'Master item. Calls openvpn_as_check.py once and stores full JSON with all metrics. Disabled by default — enable when openvpn_as_check.py is deployed and port 943 is reachable from Zabbix Server/Proxy.'
          tags:
            - tag: component
              value: raw
          triggers:
            - uuid: 2e303857e439454a82ccf87e86185874
              name: 'OpenVPN AS: No data collection'
              expression: 'nodata(/OpenVPN Access Server by External Check/openvpn_as_check.py["{$OVPN_HOST}","{$OVPN_PORT}","{$OVPN_USER}","{$OVPN_PASSWORD}","{$OVPN_AUTH_TEST_USER}","{$OVPN_AUTH_TEST_PASSWORD}","{$OVPN_VERIFY_SSL}","{$OVPN_WEB_PORT}"],5m)=1'
              priority: AVERAGE
              description: 'No data received from the external check script for 5 minutes.'
              tags:
                - tag: scope
                  value: availability
        - uuid: 7531124a299a489186d524428caa2a25
          name: 'OpenVPN AS: Active sessions'
          type: DEPENDENT
          key: ovpn.active_sessions
          delay: '0'
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          description: 'Number of currently connected VPN clients.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.active_sessions'
              error_handler: DISCARD_VALUE
          master_item:
            key: 'openvpn_as_check.py["{$OVPN_HOST}","{$OVPN_PORT}","{$OVPN_USER}","{$OVPN_PASSWORD}","{$OVPN_AUTH_TEST_USER}","{$OVPN_AUTH_TEST_PASSWORD}","{$OVPN_VERIFY_SSL}","{$OVPN_WEB_PORT}"]'
          tags:
            - tag: component
              value: sessions
          triggers:
            - uuid: 45e833a548ca4cd181b9efd1d5ff569a
              name: 'OpenVPN AS: High session count (>{$OVPN_SESSION_WARN})'
              expression: 'last(/OpenVPN Access Server by External Check/ovpn.active_sessions)>{$OVPN_SESSION_WARN}'
              priority: WARNING
              description: 'Active VPN session count exceeds the warning threshold.'
              tags:
                - tag: scope
                  value: capacity
            - uuid: b89d2aa73c03435aa4f85bad0eea7944
              name: 'OpenVPN AS: Critical session count (>{$OVPN_SESSION_HIGH})'
              expression: 'last(/OpenVPN Access Server by External Check/ovpn.active_sessions)>{$OVPN_SESSION_HIGH}'
              priority: HIGH
              description: 'Active VPN session count exceeds the high threshold.'
              tags:
                - tag: scope
                  value: capacity
        - uuid: ce5cc6906c604cbfa3c90d6608cec759
          name: 'OpenVPN AS: Bytes in'
          type: DEPENDENT
          key: ovpn.bytes_in
          delay: '0'
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          units: Bps
          description: 'Inbound traffic rate (bytes per second).'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.bytes_in'
              error_handler: DISCARD_VALUE
            - type: CHANGE_PER_SECOND
              parameters:
                - ''
          master_item:
            key: 'openvpn_as_check.py["{$OVPN_HOST}","{$OVPN_PORT}","{$OVPN_USER}","{$OVPN_PASSWORD}","{$OVPN_AUTH_TEST_USER}","{$OVPN_AUTH_TEST_PASSWORD}","{$OVPN_VERIFY_SSL}","{$OVPN_WEB_PORT}"]'
          tags:
            - tag: component
              value: traffic
        - uuid: 6bf1bc5aa4b14971bfc8254bfe52d12a
          name: 'OpenVPN AS: Bytes out'
          type: DEPENDENT
          key: ovpn.bytes_out
          delay: '0'
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          units: Bps
          description: 'Outbound traffic rate (bytes per second).'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.bytes_out'
              error_handler: DISCARD_VALUE
            - type: CHANGE_PER_SECOND
              parameters:
                - ''
          master_item:
            key: 'openvpn_as_check.py["{$OVPN_HOST}","{$OVPN_PORT}","{$OVPN_USER}","{$OVPN_PASSWORD}","{$OVPN_AUTH_TEST_USER}","{$OVPN_AUTH_TEST_PASSWORD}","{$OVPN_VERIFY_SSL}","{$OVPN_WEB_PORT}"]'
          tags:
            - tag: component
              value: traffic
        - uuid: afe09bb16cb94f2893df70e1c0f09618
          name: 'OpenVPN AS: Server version'
          type: DEPENDENT
          key: ovpn.server_version
          delay: '0'
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'OpenVPN Access Server version string.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.server_version'
              error_handler: DISCARD_VALUE
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          master_item:
            key: 'openvpn_as_check.py["{$OVPN_HOST}","{$OVPN_PORT}","{$OVPN_USER}","{$OVPN_PASSWORD}","{$OVPN_AUTH_TEST_USER}","{$OVPN_AUTH_TEST_PASSWORD}","{$OVPN_VERIFY_SSL}","{$OVPN_WEB_PORT}"]'
          tags:
            - tag: component
              value: info
        - uuid: 4b0d2b9a829c4e5184c0ee9efc625f8f
          name: 'OpenVPN AS: XMLRPC ping'
          type: DEPENDENT
          key: ovpn.xmlrpc_ping
          delay: '0'
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          description: 'XMLRPC API reachability: 1=up, 0=down.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.xmlrpc_ping'
              error_handler: DISCARD_VALUE
          master_item:
            key: 'openvpn_as_check.py["{$OVPN_HOST}","{$OVPN_PORT}","{$OVPN_USER}","{$OVPN_PASSWORD}","{$OVPN_AUTH_TEST_USER}","{$OVPN_AUTH_TEST_PASSWORD}","{$OVPN_VERIFY_SSL}","{$OVPN_WEB_PORT}"]'
          tags:
            - tag: component
              value: availability
          triggers:
            - uuid: 9bf1095efe9a4964ad0ffa1e9acd4060
              name: 'OpenVPN AS: XMLRPC API is unreachable'
              expression: 'max(/OpenVPN Access Server by External Check/ovpn.xmlrpc_ping,#3)=0'
              priority: HIGH
              description: 'The OpenVPN AS XMLRPC API has not responded for the last 3 checks.'
              tags:
                - tag: scope
                  value: availability
        - uuid: 5f3b26a1e03a4e5fba2dcff31600fdf0
          name: 'OpenVPN AS: Web portal status'
          type: DEPENDENT
          key: ovpn.web_portal_status
          delay: '0'
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          description: 'Web portal reachability: 1=up, 0=down.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.web_portal_status'
              error_handler: DISCARD_VALUE
          master_item:
            key: 'openvpn_as_check.py["{$OVPN_HOST}","{$OVPN_PORT}","{$OVPN_USER}","{$OVPN_PASSWORD}","{$OVPN_AUTH_TEST_USER}","{$OVPN_AUTH_TEST_PASSWORD}","{$OVPN_VERIFY_SSL}","{$OVPN_WEB_PORT}"]'
          tags:
            - tag: component
              value: availability
          triggers:
            - uuid: 8f4d9585e9354791a9b6589bc76a6039
              name: 'OpenVPN AS: Web portal is unreachable'
              expression: 'max(/OpenVPN Access Server by External Check/ovpn.web_portal_status,#3)=0'
              priority: HIGH
              description: 'The OpenVPN AS web portal has not responded for the last 3 checks.'
              tags:
                - tag: scope
                  value: availability
        - uuid: b85151ce2a4e4d31b738a954dceb762f
          name: 'OpenVPN AS: Web portal response time'
          type: DEPENDENT
          key: ovpn.web_portal_response_ms
          delay: '0'
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: ms
          description: 'Web portal HTTPS response time in milliseconds.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.web_portal_response_ms'
              error_handler: DISCARD_VALUE
          master_item:
            key: 'openvpn_as_check.py["{$OVPN_HOST}","{$OVPN_PORT}","{$OVPN_USER}","{$OVPN_PASSWORD}","{$OVPN_AUTH_TEST_USER}","{$OVPN_AUTH_TEST_PASSWORD}","{$OVPN_VERIFY_SSL}","{$OVPN_WEB_PORT}"]'
          tags:
            - tag: component
              value: performance
          triggers:
            - uuid: c6915ba482e747289504c875d5016920
              name: 'OpenVPN AS: Web portal slow response (>{$OVPN_WEB_RESPONSE_WARN}ms)'
              expression: 'min(/OpenVPN Access Server by External Check/ovpn.web_portal_response_ms,5m)>{$OVPN_WEB_RESPONSE_WARN}'
              priority: WARNING
              description: 'Web portal response time exceeds {$OVPN_WEB_RESPONSE_WARN}ms for 5 minutes.'
              tags:
                - tag: scope
                  value: performance
        - uuid: d1854081cd13460b942e90d73f66044e
          name: 'OpenVPN AS: LDAP auth test'
          type: DEPENDENT
          key: ovpn.ldap_auth_test
          delay: '0'
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          description: 'LDAP authentication test: 1=passed, 0=failed. Only active when {$OVPN_AUTH_TEST_USER} is set.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.ldap_auth_test'
              error_handler: DISCARD_VALUE
          master_item:
            key: 'openvpn_as_check.py["{$OVPN_HOST}","{$OVPN_PORT}","{$OVPN_USER}","{$OVPN_PASSWORD}","{$OVPN_AUTH_TEST_USER}","{$OVPN_AUTH_TEST_PASSWORD}","{$OVPN_VERIFY_SSL}","{$OVPN_WEB_PORT}"]'
          tags:
            - tag: component
              value: authentication
          triggers:
            - uuid: 06982fdbed144eac8d0fafa6e759b5e4
              name: 'OpenVPN AS: LDAP authentication is failing'
              expression: 'max(/OpenVPN Access Server by External Check/ovpn.ldap_auth_test,#3)=0'
              priority: HIGH
              description: 'LDAP authentication test has failed for the last 3 checks. Users may be unable to log in.'
              tags:
                - tag: scope
                  value: security
      tags:
        - tag: application
          value: openvpn-as
      httptests:
        - uuid: 3fa2b1c4d5e64f7a8b9c0d1e2f3a4b5c
          name: 'OpenVPN AS: LDAP login test'
          delay: 5m
          agent: Zabbix
          verify_host: 'NO'
          verify_peer: 'NO'
          # Step 2 authenticates the test user against the OVPN-AS client REST API
          # (/rest/GetUserlogin) using HTTP Basic auth. Replaces the legacy form POST
          # to /__auth__, which the modern SPA portal (2.11+) rejects with HTTP 405.
          authentication: BASIC
          http_user: '{$OVPN_AUTH_TEST_USER}'
          http_password: '{$OVPN_AUTH_TEST_PASSWORD}'
          steps:
            - name: 'Load portal'
              url: 'https://{HOST.CONN}:{$OVPN_WEB_PORT}/'
              follow_redirects: 'YES'
              retrieve_mode: BODY
              timeout: '15'
              status_codes: '200'
              # Matches both the modern OVPN-AS React portal (2.11+, '/static/standalone/'
              # asset path) and the legacy CWS markup ('OpenVPN CWS'). Either era passes.
              required: 'OpenVPN CWS|/static/standalone/'
            # GET the user-locked profile via the client REST API. Basic auth (set at the
            # scenario level) carries the test user's credentials. 200 = login OK;
            # 403 (AUTH_FAILED) = bad/disabled/locked account, which fails the step.
            - name: 'Authenticate LDAP user'
              url: 'https://{HOST.CONN}:{$OVPN_WEB_PORT}/rest/GetUserlogin'
              follow_redirects: 'YES'
              retrieve_mode: BODY
              timeout: '15'
              status_codes: '200'
  triggers:
    - uuid: b689ee16d10444ffac41aa7dcb7742e9
      name: 'OpenVPN AS: Web login test not running'
      expression: 'nodata(/OpenVPN Access Server by External Check/web.test.fail[OpenVPN AS: LDAP login test],15m)=1'
      priority: AVERAGE
      description: 'No data from the web login scenario for 15 minutes. Zabbix may have lost connectivity to the portal or the scenario is misconfigured.'
      tags:
        - tag: scope
          value: availability
    - uuid: a871f3aee8cd457b88530288cca5d2be
      name: 'OpenVPN AS: Web login test failed'
      expression: 'min(/OpenVPN Access Server by External Check/web.test.fail[OpenVPN AS: LDAP login test],#2)>0'
      priority: HIGH
      description: 'Web login scenario failed on step {ITEM.LASTVALUE}. Check the Last error message item for details. A disabled or locked-out user account will cause step 2 to return HTTP 403.'
      dependencies:
        - name: 'OpenVPN AS: Web login test not running'
          expression: 'nodata(/OpenVPN Access Server by External Check/web.test.fail[OpenVPN AS: LDAP login test],15m)=1'
          recovery_expression: ''
      tags:
        - tag: scope
          value: availability
    - uuid: 8429973f0f6345aa841ab9dd2248b163
      name: 'OpenVPN AS: Web login test error'
      expression: 'length(last(/OpenVPN Access Server by External Check/web.test.error[OpenVPN AS: LDAP login test]))>0 and last(/OpenVPN Access Server by External Check/web.test.fail[OpenVPN AS: LDAP login test])>0'
      priority: HIGH
      description: 'Web login scenario reported an error. Check the Last error message item value for the exact failure reason.'
      dependencies:
        - name: 'OpenVPN AS: Web login test failed'
          expression: 'min(/OpenVPN Access Server by External Check/web.test.fail[OpenVPN AS: LDAP login test],#2)>0'
          recovery_expression: ''
      tags:
        - tag: scope
          value: availability
    - uuid: 28276439d66c43c6a6a13763da7ab29d
      name: 'OpenVPN AS: Web login slow response (>5s)'
      expression: 'min(/OpenVPN Access Server by External Check/web.test.time[OpenVPN AS: LDAP login test,Authenticate LDAP user,resp],5m)>5'
      priority: WARNING
      description: 'Authentication step takes over 5 seconds for 5 minutes. OpenVPN AS may be under load or the auth backend (LDAP/AD) is slow.'
      dependencies:
        - name: 'OpenVPN AS: Web login test not running'
          expression: 'nodata(/OpenVPN Access Server by External Check/web.test.fail[OpenVPN AS: LDAP login test],15m)=1'
          recovery_expression: ''
      tags:
        - tag: scope
          value: performance
  graphs:
    - uuid: a8952c38fd23497999f585570115fe59
      name: 'OpenVPN AS: VPN Sessions'
      type: NORMAL
      ymin_type_1: FIXED
      ymin_item_1: '0'
      graph_items:
        - sortorder: '0'
          drawtype: GRADIENT_LINE
          color: 1A7C11
          yaxisside: LEFT
          calc_fnc: AVG
          item:
            host: 'OpenVPN Access Server by External Check'
            key: ovpn.active_sessions
    - uuid: 8aa2d8ceed87481bbdf834a969e55e74
      name: 'OpenVPN AS: Network Traffic'
      type: NORMAL
      ymin_type_1: FIXED
      ymin_item_1: '0'
      graph_items:
        - sortorder: '0'
          drawtype: GRADIENT_LINE
          color: 1A7C11
          yaxisside: LEFT
          calc_fnc: AVG
          item:
            host: 'OpenVPN Access Server by External Check'
            key: ovpn.bytes_in
        - sortorder: '1'
          drawtype: GRADIENT_LINE
          color: F63100
          yaxisside: LEFT
          calc_fnc: AVG
          item:
            host: 'OpenVPN Access Server by External Check'
            key: ovpn.bytes_out
    - uuid: 97766619032546e6b50ea34466e59504
      name: 'OpenVPN AS: Web Portal Response Time'
      type: NORMAL
      ymin_type_1: FIXED
      ymin_item_1: '0'
      graph_items:
        - sortorder: '0'
          drawtype: GRADIENT_LINE
          color: 2774A4
          yaxisside: LEFT
          calc_fnc: AVG
          item:
            host: 'OpenVPN Access Server by External Check'
            key: ovpn.web_portal_response_ms
